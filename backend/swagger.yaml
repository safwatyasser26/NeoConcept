  /courses/{courseId}/quizzes/{quizId}/submit:
    post:
      tags:
        - Quizzes
      summary: Submit quiz answers (student, one-time)
      description: >
        One-time monolithic submission. MCQ answers are auto-graded immediately.
        SHORT_ANSWER responses are stored and flagged for manual instructor grading.
        Submission is rejected if the quiz duration has elapsed.
      security:
        - cookieAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
            example: d6e03f03-38bc-47ed-b0e6-3a90e6bdcbd1
        - name: quizId
          in: path
          required: true
          schema:
            type: string
            example: 9c816942-585d-4d23-b44b-fcb0915558fc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - answers
              properties:
                answers:
                  type: array
                  items:
                    type: object
                    required:
                      - questionId
                    properties:
                      questionId:
                        type: string
                        format: uuid
                        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      selectedOptionId:
                        type: string
                        format: uuid
                        description: Required for MULTIPLE_CHOICE questions
                        example: b2c3d4e5-f6a7-8901-bcde-f12345678901
                      textAnswer:
                        type: string
                        description: Required for SHORT_ANSWER questions
                        example: The answer is photosynthesis
      responses:
        "200":
          description: Submission successful. Returns attempt with correctCount and scorePercentage.
        "400":
          description: >
            You have already submitted this quiz ||
            Submission time has expired ||
            Question does not belong to this quiz ||
            Option does not belong to this question ||
            No active attempt found. Please start the quiz first
        "401":
          description: Unauthorized
        "403":
          description: You're not a member of this course || Only students can perform this action
        "404":
          description: Course not found || Quiz not found
        "500":
          description: Something went wrong

